services:

  backend:
    build: ./app
    container_name: flask-backend
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-db

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - pgdata:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./app/code/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend

volumes:
  pgdata:
