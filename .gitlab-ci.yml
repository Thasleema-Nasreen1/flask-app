stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock

build-job:
  stage: build
  tags:
    - docker-runner
  image: docker:latest
  script:
    - docker compose build
  only:
    - main

deploy-job:
  stage: deploy
  tags:
    - docker-runner
  image: docker:latest
  script:
    - docker compose down --remove-orphans || true
    - docker compose up -d --build --force-recreate --remove-orphans
  only:
    - main
