stages:
  - build
  - deploy

build-job:
  stage: build
  tags:
    - docker-runner

  script:
    - docker compose build

  only:
    - main

deploy-job:
  stage: deploy
  tags:
    - flask-runner

  needs:
    - build-job

  script:
    - docker compose down
    - docker compose up -d

  only:
    - main
